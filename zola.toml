base_url = "https://fer.github.io/zola-theme-kaonashi"
title = "Kaonashi Theme Demo"
description = "A demo site for the Kaonashi Zola theme"
compile_sass = true
build_search_index = true

taxonomies = [
  {name = "tags", feed = true},
]

[markdown.highlighting]
theme = "catppuccin-mocha"

[extra]
author = "fer"
bio = "A writer sharing work on web design, theming, and modern publishing."

[extra.social]
github = "https://github.com/fer"
email = "mailto:hello@example.com"
